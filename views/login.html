    <link rel="stylesheet" href="../styles/home.css" />

  <body>
    <header>
      <nav>
        <a href="../"
          ><img src="../media/images/logo.png" alt="" id="logo"
        /></a>
        <!-- Barra de búsqueda -->

          <!--img src="../media/images/loop.png" class="search-icon" /-->
          <input type="search" id="search" placeholder="Buscar productos..." />

        <button type="submit" id="login-btn">Iniciar Sesión</button>
        <a id="recover-pws" href="../views/recuperarPWS.html"><sub>Olvido su contraseña?</sub></a>
