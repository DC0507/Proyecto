<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Cuenta</title>
    <link rel="stylesheet" href="../styles/home.css" />
    <link rel="stylesheet" href="../styles/miCuenta.css" />
  </head>
  <body data-requires-auth="true">
    <!-- Contenedor del header con nav y categorias -->
    <header>
      <nav class="nav-wrapper"></nav>
      <div class="categories-container"></div>
    </header>
    <!-- Contenedor principal con datos del perfil y formulario de actualizacion -->
    <main id="cuenta-container">
      <h1>Informacion de Mi Cuenta</h1>
      <p><strong>Nombre:</strong> <span id="perfil-nombre">Cargando...</span></p>
      <p><strong>Apellido:</strong> <span id="perfil-apellido">Cargando...</span></p>
      <p><strong>Telefono:</strong> <span id="perfil-telefono">Cargando...</span></p>
      <p><strong>Correo:</strong> <span id="perfil-correo">Cargando...</span></p>

      <form id="perfil-form">
        <h2>Actualizar Contacto</h2>
        <label for="input-telefono">Telefono</label>
        <input id="input-telefono" name="telefono" type="tel" placeholder="Telefono" />

        <label for="input-correo">Correo</label>
        <input id="input-correo" name="correo" type="email" placeholder="Correo electronico" />

        <button type="submit" id="perfil-guardar-btn">Guardar cambios</button>
      </form>
    </main>
    <!-- Importa footer y scripts de autenticacion/perfil -->
    <script type="module" src="./components/footer.js"></script>
    <script type="module" src="../scripts/auth.js"></script>
    <script type="module" src="../scripts/miCuenta.js"></script>
  </body>
</html>
